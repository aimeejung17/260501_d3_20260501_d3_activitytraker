<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1b5e20" />
  <title>FlowXP — 지금은 레벨업 중입니다</title>
  <meta name="description" content="FlowXP — SNS 사용 시간을 레벨·XP로 보여주는 화면" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Noto+Sans+KR:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sky-top: #7ec8e3;
      --sky-mid: #b8e6f0;
      --grass: #c8e6c9;
      --hill: #66bb6a;
      --hill-dark: #2e7d32;
      --card: rgba(255, 255, 255, 0.92);
      --card-border: rgba(255, 255, 255, 0.85);
      --text: #1b3d1f;
      --text-soft: #33691e;
      --accent: #43a047;
      --accent-deep: #1b5e20;
      --sun: #fff9c4;
      --shadow: 0 8px 32px rgba(27, 94, 32, 0.12);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Nunito", "Noto Sans KR", system-ui, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 42%, var(--grass) 78%, #a5d6a7 100%);
      padding: 0 16px 120px;
      max-width: 440px;
      margin-left: auto;
      margin-right: auto;
      position: relative;
      overflow-x: hidden;
    }
    /* 언덕 실루엣 */
    body::after {
      content: "";
      position: fixed;
      bottom: 0;
      left: -20%;
      right: -20%;
      height: 100px;
      background: radial-gradient(ellipse 120% 100% at 50% 0%, var(--hill) 0%, var(--hill-dark) 72%);
      z-index: 0;
      pointer-events: none;
    }
    .wrap { position: relative; z-index: 1; padding-top: 20px; }

    /* 태양 장식 */
    .sun {
      position: absolute;
      top: 12px;
      right: 8%;
      width: 48px;
      height: 48px;
      background: radial-gradient(circle at 30% 30%, #fffef5, var(--sun));
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(255, 235, 120, 0.5);
      opacity: 0.95;
    }

    header {
      text-align: center;
      margin-bottom: 18px;
      padding-top: 8px;
    }
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .logo-tree {
      width: 52px;
      height: 52px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,.12));
    }
    h1 {
      font-size: 1.85rem;
      font-weight: 800;
      margin: 0;
      letter-spacing: -0.02em;
      color: var(--accent-deep);
      text-shadow: 0 1px 0 rgba(255,255,255,.6);
    }
    .sub {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-soft);
      margin: 6px 0 0;
      opacity: 0.95;
    }
    .tagline {
      font-size: 0.78rem;
      color: var(--text-soft);
      margin-top: 8px;
      opacity: 0.85;
      line-height: 1.45;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 22px 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    .card-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent-deep);
      opacity: 0.75;
      margin-bottom: 10px;
      text-align: center;
    }

    .level-ring {
      width: 120px;
      height: 120px;
      margin: 0 auto 14px;
      border-radius: 50%;
      background: linear-gradient(145deg, #e8f5e9, #c8e6c9);
      border: 4px solid #fff;
      box-shadow: inset 0 2px 12px rgba(46, 125, 50, 0.15), 0 6px 20px rgba(27, 94, 32, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .level-ring::after {
      content: "🌱";
      position: absolute;
      bottom: -4px;
      right: -4px;
      font-size: 1.35rem;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,.15));
    }
    .level {
      font-size: 2.75rem;
      font-weight: 800;
      color: var(--accent-deep);
      line-height: 1;
    }
    .level.level-pop {
      animation: pop 0.45s ease;
    }
    @keyframes pop {
      0% { transform: scale(1); }
      45% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .xp-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text-soft);
    }
    .bar-wrap {
      height: 16px;
      background: #e0e0e0;
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 2px 4px rgba(0,0,0,.08);
    }
    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
      background: linear-gradient(90deg, #81c784, var(--accent), #2e7d32);
      box-shadow: 0 0 12px rgba(67, 160, 71, 0.5);
    }

    label.slider-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text);
      margin-bottom: 10px;
    }
    .slider-label span { font-size: 1.1rem; }
    input[type="range"] {
      width: 100%;
      height: 10px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .stat {
      background: linear-gradient(180deg, #f1f8e9 0%, #e8f5e9 100%);
      padding: 12px 10px;
      border-radius: 16px;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-soft);
      border: 1px solid rgba(129, 199, 132, 0.35);
    }
    .stat b {
      display: block;
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--accent-deep);
      margin-top: 6px;
      font-family: "Nunito", sans-serif;
    }
    .apps-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-soft);
      margin: 16px 0 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .apps {
      list-style: none;
      padding: 0;
      margin: 0;
      background: rgba(255,255,255,.65);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(129, 199, 132, 0.25);
    }
    .apps li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      font-size: 0.88rem;
      font-weight: 600;
      border-bottom: 1px dashed rgba(46, 125, 50, 0.15);
    }
    .apps li:last-child { border-bottom: none; }
    .apps li span:first-child::before {
      content: "🍃 ";
      opacity: 0.85;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    button {
      flex: 1;
      min-width: 130px;
      padding: 14px 16px;
      border: none;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      font-family: inherit;
      background: linear-gradient(180deg, #66bb6a 0%, var(--accent) 55%, var(--accent-deep) 100%);
      color: #fff;
      box-shadow: 0 4px 14px rgba(46, 125, 50, 0.35);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(46, 125, 50, 0.42);
    }
    button:active { transform: translateY(0); }
    button.secondary {
      background: #fff;
      color: var(--accent-deep);
      border: 2px solid #81c784;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    button.secondary:hover {
      background: #f1f8e9;
      box-shadow: 0 4px 12px rgba(46, 125, 32, 0.12);
    }
    .hint {
      font-size: 0.78rem;
      color: var(--text-soft);
      margin: 12px 0 6px;
      line-height: 1.5;
      opacity: 0.9;
    }

    footer {
      text-align: center;
      margin-top: 28px;
      padding-bottom: 24px;
      font-size: 0.75rem;
      color: var(--text-soft);
      line-height: 1.7;
      position: relative;
      z-index: 1;
    }
    footer a {
      color: var(--accent-deep);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="sun" aria-hidden="true"></div>
  <div class="wrap">
    <header>
      <div class="logo-row">
        <svg class="logo-tree" viewBox="0 0 64 64" aria-hidden="true">
          <ellipse cx="32" cy="54" rx="10" ry="6" fill="#5d4037"/>
          <path d="M32 48 L32 28" stroke="#4e342e" stroke-width="4" stroke-linecap="round"/>
          <circle cx="32" cy="22" r="18" fill="#2e7d32"/>
          <circle cx="22" cy="28" r="12" fill="#388e3c"/>
          <circle cx="42" cy="28" r="12" fill="#43a047"/>
          <circle cx="32" cy="14" r="10" fill="#66bb6a"/>
        </svg>
        <div>
          <h1>FlowXP</h1>
          <p class="sub">지금은 레벨업 중입니다</p>
        </div>
      </div>
      <p class="tagline">SNS 사용 시간을 <strong>레벨·XP</strong>로 바꿔 보여주는 FlowXP 화면이에요.</p>
    </header>

    <div class="card">
      <div class="card-title">Growth</div>
      <div class="level-ring">
        <div class="level" id="level">1</div>
      </div>
      <div class="xp-row">
        <span>경험치 XP</span>
        <span id="xpText">0 / 100</span>
      </div>
      <div class="bar-wrap"><div class="bar-fill" id="xpBar" style="width:0%"></div></div>
    </div>

    <div class="card">
      <div class="card-title">Today</div>
      <label class="slider-label" for="minutes"><span>⏱</span> 오늘 SNS 사용 (분)</label>
      <input type="range" id="minutes" min="0" max="240" value="45" />
      <div class="stats">
        <div class="stat">오늘 사용 <b id="minVal">45</b>분</div>
        <div class="stat">점수 <b id="scoreVal">—</b></div>
        <div class="stat">오늘 XP(예상) <b id="xpPreview">—</b></div>
        <div class="stat">스트릭 <b id="streakVal">0</b>일</div>
      </div>
      <div class="apps-title">앱별 사용</div>
      <ul class="apps" id="appList"></ul>
      <div class="btn-row">
        <button type="button" id="btnRandom">랜덤으로 채우기</button>
        <button type="button" class="secondary" id="btnXp">XP +30 받기</button>
      </div>
      <p class="hint">스트릭은 아래 버튼으로 조절해요.</p>
      <div class="btn-row">
        <button type="button" class="secondary" id="btnStreakOk">오늘 성공(≤60분)</button>
        <button type="button" class="secondary" id="btnStreakFail">오늘 실패</button>
      </div>
    </div>

    <footer>
      안드로이드 앱 코드:
      <a href="https://github.com/aimeejung17/260501_d3_20260501_d3_activitytraker" target="_blank" rel="noopener">GitHub</a>
      <br />점수: 0–30분→10점 … 181분+→0점 · XP = 점수×10
    </footer>
  </div>

  <script>
    function scoreFromMinutes(m) {
      if (m <= 30) return 10;
      if (m <= 60) return 8;
      if (m <= 120) return 5;
      if (m <= 180) return 3;
      return 0;
    }
    const apps = [
      { name: "Instagram", key: 0.28 },
      { name: "YouTube", key: 0.35 },
      { name: "TikTok", key: 0.22 },
      { name: "기타", key: 0.15 },
    ];

    let level = 1;
    let currentXp = 0;
    let streakDemo = 0;

    const el = (id) => document.getElementById(id);

    function renderApps(total) {
      const list = el("appList");
      list.innerHTML = "";
      if (total <= 0) {
        const li = document.createElement("li");
        li.innerHTML = "<span>앱</span><span>0분</span>";
        list.appendChild(li);
        return;
      }
      let left = total;
      apps.forEach((a, i) => {
        const portion = i === apps.length - 1 ? Math.max(0, left) : Math.round(total * a.key);
        left -= portion;
        const li = document.createElement("li");
        li.innerHTML = `<span>${a.name}</span><span>${Math.max(0, portion)}분</span>`;
        list.appendChild(li);
      });
    }

    function renderXp() {
      const startLevel = level;
      el("level").textContent = String(level);
      el("xpText").textContent = currentXp + " / 100";
      el("xpBar").style.width = Math.min(100, currentXp) + "%";
      while (currentXp >= 100) {
        currentXp -= 100;
        level += 1;
        el("level").textContent = String(level);
        el("xpText").textContent = currentXp + " / 100";
        el("xpBar").style.width = Math.min(100, currentXp) + "%";
      }
      if (level > startLevel) {
        const lv = el("level");
        lv.classList.remove("level-pop");
        void lv.offsetWidth;
        lv.classList.add("level-pop");
      }
    }

    function syncFromSlider() {
      const m = +el("minutes").value;
      el("minVal").textContent = String(m);
      const s = scoreFromMinutes(m);
      el("scoreVal").textContent = String(s);
      el("xpPreview").textContent = String(s * 10);
      renderApps(m);
    }

    function renderStreak() {
      el("streakVal").textContent = String(streakDemo);
    }

    el("minutes").addEventListener("input", syncFromSlider);

    el("btnRandom").addEventListener("click", () => {
      el("minutes").value = String(Math.floor(Math.random() * 200));
      syncFromSlider();
    });

    el("btnXp").addEventListener("click", () => {
      currentXp += 30;
      renderXp();
    });

    el("btnStreakOk").addEventListener("click", () => {
      streakDemo = Math.min(streakDemo + 1, 99);
      renderStreak();
    });
    el("btnStreakFail").addEventListener("click", () => {
      streakDemo = 0;
      renderStreak();
    });

    renderStreak();
    syncFromSlider();
  </script>
</body>
</html>
